app = "command-deck-berge"
primary_region = "arn"

[build]

[env]
  PORT = "8080"
  LAT = "60.3913"
  LON = "5.3221"
  DB_PATH = "/app/data/deck.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "deck_data"
  destination = "/app/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
